    primer23            = /.../<workdir>/<tools>/cutPrimers/example/primers_R2_3.fa

    reference-directory = /.../<workdir>/<static>/ref
    reference           = /.../<workdir>/<static>/ref/ucsc.hg19/ucsc.hg19.fa
    annotation-database = /.../<workdir>/<static>/annotation_databases/clinvar_20250806.vcf

    convert2annovar     = /.../<workdir>/<tools>/annovar/convert2annovar.pl
    table_annovar       = /.../<workdir>/<tools>/annovar/table_annovar.pl
    annovar_humandb     = /.../<workdir>/<tools>/annovar/humandb

    reads-dir           = /.../<workdir>/<static>/<reeds_dir>

