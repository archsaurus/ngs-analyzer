[Pathes]
    python              = /.../<workdir>/bin/python3.13
    java                = /usr/lib/jvm/default-runtime/bin/java

    bwa-mem2            = /.../<workdir>/<tools>/bwa-mem2-2.2.1_x64-linux/bwa-mem2
